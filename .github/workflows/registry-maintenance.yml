name: Registry Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        required: true
        options: [list, delete]
      repository:
        description: "Repository name to delete when action=delete."
        required: false

permissions:
  contents: read

jobs:
  registry:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
      - name: List repositories
        if: inputs.action == 'list'
        env:
          REPOSITORY: ${{ inputs.repository }}
        run: |
          doctl registry repository list
          if [ -n "$REPOSITORY" ]; then
            doctl registry repository list-manifests "$REPOSITORY" || true
            doctl registry repository list-tags "$REPOSITORY" || true
          fi
      - name: Delete repository
        if: inputs.action == 'delete'
        env:
          REPOSITORY: ${{ inputs.repository }}
        run: |
          if [ -z "$REPOSITORY" ]; then
            echo "repository input is required for delete" >&2
            exit 1
          fi
          tags="$(doctl registry repository list-tags "$REPOSITORY" 2>/dev/null | awk 'NR > 1 && $1 != "" { print $1 }' || true)"
          if [ -z "$tags" ]; then
            echo "No tags found for repository $REPOSITORY"
          else
            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                doctl registry repository delete-tag "$REPOSITORY" "$tag" --force
              fi
            done <<< "$tags"
          fi
          manifests="$(doctl registry repository list-manifests "$REPOSITORY" | awk 'NR > 1 && $1 != "" { print $1 }')"
          if [ -z "$manifests" ]; then
            echo "No manifests found for repository $REPOSITORY"
            exit 0
          fi
          while IFS= read -r manifest; do
            if [ -n "$manifest" ]; then
              doctl registry repository delete-manifest "$REPOSITORY" "$manifest" --force
            fi
          done <<< "$manifests"
