apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler-valkey
  template:
    metadata:
      labels:
        app: scheduler-valkey
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: valkey
              containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: valkey
            periodSeconds: 30
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler-valkey
spec:
  selector:
    app: scheduler-valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
