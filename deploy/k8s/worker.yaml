apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler-worker
  template:
    metadata:
      labels:
        app: scheduler-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: IMAGE_REF_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker.main"]
          envFrom:
            - secretRef:
                name: scheduler-secrets
          env:
            - name: QUEUE_BACKEND
              value: valkey
            - name: REDIS_URL
              value: redis://scheduler-valkey:6379/0
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
