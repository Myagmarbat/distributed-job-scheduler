services:
  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      QUEUE_BACKEND: valkey
      REDIS_URL: redis://valkey:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

  worker:
    build: .
    command: python -m app.worker.main
    environment:
      DATABASE_URL: postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      QUEUE_BACKEND: valkey
      REDIS_URL: redis://valkey:6379/0
      WORKER_ID: worker-compose-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
